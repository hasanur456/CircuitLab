<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CircuitLab — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>

  <!-- ═══════════════════════════════════════════════
       STYLES
  ═══════════════════════════════════════════════ -->
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:      #050810;
      --bg-panel:     #0a0f1e;
      --bg-card:      #0d1428;
      --border:       #1a2444;
      --border-glow:  #0ff;
      --neon-cyan:    #00f5ff;
      --neon-blue:    #0077ff;
      --neon-purple:  #7b2fff;
      --neon-green:   #00ff9d;
      --text-primary: #e8f4ff;
      --text-muted:   #5a7a9a;
      --text-dim:     #2a4060;
      --danger:       #ff3366;
      --success:      #00ff9d;
      --font-mono:    'Share Tech Mono', monospace;
      --font-body:    'Rajdhani', sans-serif;
      --font-display: 'Orbitron', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow: hidden;
    }

    /* ── Animated Grid Background ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* ── Radial Glow Blobs ── */
    .bg-blob {
      position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; pointer-events: none;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(0,119,255,0.12) 0%, transparent 70%);
      top: -100px; left: -100px;
      animation: blobFloat 8s ease-in-out infinite alternate;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(123,47,255,0.10) 0%, transparent 70%);
      bottom: -80px; right: -80px;
      animation: blobFloat 10s ease-in-out infinite alternate-reverse;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(0,245,255,0.06) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      animation: blobPulse 6s ease-in-out infinite;
    }

    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 40px) scale(1.1); }
    }
    @keyframes blobPulse {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.15); }
    }

    /* ── Circuit SVG Decoration ── */
    .circuit-lines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.15;
    }

    /* ── Scanline Overlay ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.05) 2px,
        rgba(0,0,0,0.05) 4px
      );
    }

    /* ── Main Layout ── */
    .page {
      position: relative; z-index: 2;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Card ── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Corner accents */
    .card::before, .card::after {
      content: ''; position: absolute;
      width: 16px; height: 16px;
      border-color: var(--neon-cyan);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Top glow bar */
    .card-glow-bar {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-blue), var(--neon-purple), transparent);
      animation: glowBar 3s linear infinite;
      background-size: 200% 100%;
    }
    @keyframes glowBar {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Header ── */
    .card-header {
      padding: 32px 36px 24px;
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .logo-wrap {
      display: inline-flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      position: relative;
    }

    .logo-icon svg { width: 100%; height: 100%; }

    .logo-text {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--neon-cyan);
      text-shadow: 0 0 20px rgba(0,245,255,0.5);
    }

    .logo-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Tab Switcher ── */
    .tab-bar {
      display: flex;
      margin: 0 36px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .tab-btn {
      flex: 1; padding: 14px 0;
      background: none; border: none; cursor: pointer;
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      position: relative;
      transition: color 0.3s;
    }
    .tab-btn.active { color: var(--neon-cyan); }
    .tab-btn.active::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0; height: 2px;
      background: var(--neon-cyan);
      box-shadow: 0 0 8px var(--neon-cyan);
    }

    /* ── Body ── */
    .card-body { padding: 28px 36px 32px; }

    /* ── Form Panel ── */
    .form-panel { display: none; animation: fadeSlide 0.3s ease both; }
    .form-panel.active { display: block; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Form Groups ── */
    .form-group { margin-bottom: 18px; }

    .form-label {
      display: flex; align-items: center; gap: 6px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .label-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--neon-cyan);
      box-shadow: 0 0 6px var(--neon-cyan);
    }

    .input-wrap { position: relative; }

    .form-input {
      width: 100%; padding: 12px 16px 12px 42px;
      background: rgba(0,245,255,0.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 14px;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--text-dim); }
    .form-input:focus {
      border-color: var(--neon-cyan);
      background: rgba(0,245,255,0.05);
      box-shadow: 0 0 0 3px rgba(0,245,255,0.08), inset 0 0 20px rgba(0,245,255,0.03);
    }
    .form-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(255,51,102,0.1);
    }

    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-dim);
      transition: color 0.2s;
      pointer-events: none;
    }
    .form-input:focus ~ .input-icon { color: var(--neon-cyan); }

    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); padding: 2px;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--neon-cyan); }

    /* ── Error / Success Messages ── */
    .msg {
      padding: 10px 14px;
      border-radius: 3px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      display: none;
      align-items: flex-start;
      gap: 8px;
    }
    .msg.error {
      background: rgba(255,51,102,0.08);
      border: 1px solid rgba(255,51,102,0.3);
      color: #ff6688;
      display: flex;
    }
    .msg.success {
      background: rgba(0,255,157,0.08);
      border: 1px solid rgba(0,255,157,0.3);
      color: var(--neon-green);
      display: flex;
    }
    .msg.hidden { display: none !important; }

    /* ── Submit Button ── */
    .btn-primary {
      width: 100%; padding: 14px;
      background: transparent;
      border: 1px solid var(--neon-cyan);
      border-radius: 3px;
      color: var(--neon-cyan);
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: color 0.3s, box-shadow 0.3s;
      margin-top: 8px;
    }

    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--neon-cyan);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 0;
    }

    .btn-primary:hover::before { transform: translateX(0); }
    .btn-primary:hover {
      color: var(--bg-deep);
      box-shadow: 0 0 20px rgba(0,245,255,0.3);
    }
    .btn-primary:active { transform: scale(0.99); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary span { position: relative; z-index: 1; }

    /* ── Loading Spinner ── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .divider-text {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim); letter-spacing: 2px;
    }

    /* ── OAuth Button ── */
    .btn-oauth {
      width: 100%; padding: 11px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text-muted);
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-oauth:hover {
      border-color: var(--text-muted);
      color: var(--text-primary);
      background: rgba(255,255,255,0.05);
    }

    /* ── Footer ── */
    .card-footer {
      padding: 16px 36px 24px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      border-top: 1px solid var(--border);
    }

    /* ── Status Bar ── */
    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      background: rgba(5,8,16,0.9);
      border-top: 1px solid var(--border);
      padding: 6px 20px;
      display: flex; align-items: center; gap: 20px;
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-dim); letter-spacing: 1px;
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 6px var(--neon-green);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    .status-sep { color: var(--text-dim); opacity: 0.3; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card-header, .card-body, .tab-bar { padding-left: 24px; padding-right: 24px; }
      .tab-bar { margin: 0 24px; }
      .card-footer { padding: 14px 24px 20px; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-grid"></div>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- Decorative circuit SVG -->
  <svg class="circuit-lines" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#00f5ff" stroke-width="1" fill="none" opacity="1">
      <!-- Horizontal traces -->
      <polyline points="0,120 200,120 200,180 500,180"/>
      <polyline points="0,300 100,300 100,240 350,240 350,300 600,300"/>
      <polyline points="900,120 1100,120 1100,60 1400,60"/>
      <polyline points="800,300 1000,300 1000,360 1400,360"/>
      <polyline points="0,600 150,600 150,660 400,660"/>
      <polyline points="600,750 800,750 800,700 1100,700 1100,750 1400,750"/>
      <polyline points="0,800 300,800 300,840 700,840"/>
      <!-- Vertical traces -->
      <polyline points="700,0 700,100 760,100 760,250"/>
      <polyline points="1200,0 1200,180 1150,180 1150,400"/>
      <polyline points="400,900 400,700 450,700 450,500"/>
      <!-- Component symbols -->
      <!-- Resistor left -->
      <rect x="185" y="170" width="30" height="12" rx="1" stroke-width="1.5"/>
      <!-- Capacitor -->
      <line x1="340" y1="230" x2="340" y2="260"/>
      <line x1="330" y1="242" x2="350" y2="242"/>
      <line x1="330" y1="250" x2="350" y2="250"/>
      <!-- Resistor right -->
      <rect x="1085" y="115" width="30" height="12" rx="1" stroke-width="1.5"/>
      <!-- Ground symbols -->
      <line x1="600" y1="300" x2="600" y2="320"/>
      <line x1="590" y1="320" x2="610" y2="320"/>
      <line x1="594" y1="326" x2="606" y2="326"/>
      <line x1="598" y1="332" x2="602" y2="332"/>
      <!-- Nodes -->
      <circle cx="200" cy="120" r="3" fill="#00f5ff"/>
      <circle cx="100" cy="300" r="3" fill="#00f5ff"/>
      <circle cx="1100" cy="120" r="3" fill="#00f5ff"/>
      <circle cx="700" cy="100" r="3" fill="#00f5ff"/>
      <circle cx="400" cy="660" r="3" fill="#00f5ff"/>
      <circle cx="800" cy="750" r="3" fill="#00f5ff"/>
    </g>
    <!-- Animated pulse on one trace -->
    <circle r="4" fill="#00f5ff" opacity="0.8">
      <animateMotion dur="4s" repeatCount="indefinite">
        <mpath href="#trace1"/>
      </animateMotion>
    </circle>
    <path id="trace1" d="M0,120 L200,120 L200,180 L500,180" fill="none"/>
    <circle r="3" fill="#7b2fff" opacity="0.9">
      <animateMotion dur="6s" repeatCount="indefinite">
        <mpath href="#trace2"/>
      </animateMotion>
    </circle>
    <path id="trace2" d="M900,120 L1100,120 L1100,60 L1400,60" fill="none"/>
  </svg>

  <div class="scanlines"></div>

  <!-- ── Main Card ── -->
  <main class="page">
    <div class="card" id="authCard">
      <div class="card-glow-bar"></div>

      <header class="card-header">
        <div class="logo-wrap">
          <div class="logo-icon">
            <!-- Circuit board icon -->
            <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="1" width="34" height="34" rx="3" stroke="#00f5ff" stroke-width="1.5"/>
              <circle cx="9"  cy="9"  r="2.5" stroke="#00f5ff" stroke-width="1.5"/>
              <circle cx="27" cy="9"  r="2.5" stroke="#00f5ff" stroke-width="1.5"/>
              <circle cx="9"  cy="27" r="2.5" stroke="#00f5ff" stroke-width="1.5"/>
              <circle cx="27" cy="27" r="2.5" stroke="#00f5ff" stroke-width="1.5"/>
              <circle cx="18" cy="18" r="4"   stroke="#7b2fff" stroke-width="1.5"/>
              <line x1="11.5" y1="9"  x2="24.5" y2="9"  stroke="#00f5ff" stroke-width="1"/>
              <line x1="9"    y1="11.5" x2="9"  y2="24.5" stroke="#00f5ff" stroke-width="1"/>
              <line x1="27"   y1="11.5" x2="27" y2="24.5" stroke="#00f5ff" stroke-width="1"/>
              <line x1="9"    y1="18" x2="14"  y2="18"   stroke="#00f5ff" stroke-width="1"/>
              <line x1="22"   y1="18" x2="27"  y2="18"   stroke="#00f5ff" stroke-width="1"/>
              <line x1="18"   y1="27" x2="18"  y2="22"   stroke="#00f5ff" stroke-width="1"/>
            </svg>
          </div>
          <div>
            <div class="logo-text">CIRCUITLAB</div>
            <div class="logo-sub">Simulation Platform</div>
          </div>
        </div>
      </header>

      <!-- Tab Bar -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn"        id="tabSignUp" onclick="switchTab('signup')">Register</button>
      </div>

      <div class="card-body">

        <!-- ══ SIGN IN PANEL ══ -->
        <div class="form-panel active" id="panelSignin">

          <div id="msgSignin" class="msg hidden"></div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label">
              <span class="label-dot"></span> Email Address
            </label>
            <div class="input-wrap">
              <input type="email" id="siEmail" class="form-input"
                     placeholder="you@domain.com" autocomplete="email"/>
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <polyline points="2,4 12,13 22,4"/>
              </svg>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label">
              <span class="label-dot"></span> Password
            </label>
            <div class="input-wrap">
              <input type="password" id="siPassword" class="form-input"
                     placeholder="••••••••••" autocomplete="current-password"/>
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <button class="toggle-pw" type="button" onclick="togglePw('siPassword', this)" aria-label="Toggle password">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button class="btn-primary" id="btnSignin" onclick="handleSignIn()">
            <span id="btnSigninText">
              <span>Initialize Session</span>
            </span>
          </button>

          <div class="divider"><span class="divider-text">or</span></div>

          <button class="btn-oauth" onclick="handleGoogleSignIn()">
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
        </div>

        <!-- ══ SIGN UP PANEL ══ -->
        <div class="form-panel" id="panelSignup">

          <div id="msgSignup" class="msg hidden"></div>

          <!-- Display Name -->
          <div class="form-group">
            <label class="form-label">
              <span class="label-dot"></span> Display Name
            </label>
            <div class="input-wrap">
              <input type="text" id="suName" class="form-input"
                     placeholder="Engineer Name" autocomplete="name"/>
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label">
              <span class="label-dot"></span> Email Address
            </label>
            <div class="input-wrap">
              <input type="email" id="suEmail" class="form-input"
                     placeholder="you@domain.com" autocomplete="email"/>
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <polyline points="2,4 12,13 22,4"/>
              </svg>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label class="form-label">
              <span class="label-dot"></span> Password
            </label>
            <div class="input-wrap">
              <input type="password" id="suPassword" class="form-input"
                     placeholder="Min. 6 characters" autocomplete="new-password"/>
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <button class="toggle-pw" type="button" onclick="togglePw('suPassword', this)" aria-label="Toggle password">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <!-- Password strength -->
            <div id="pwStrength" style="display:none; margin-top:8px;">
              <div style="display:flex; gap:4px; margin-bottom:4px;">
                <div id="ps1" style="flex:1; height:3px; border-radius:2px; background:var(--border);"></div>
                <div id="ps2" style="flex:1; height:3px; border-radius:2px; background:var(--border);"></div>
                <div id="ps3" style="flex:1; height:3px; border-radius:2px; background:var(--border);"></div>
                <div id="ps4" style="flex:1; height:3px; border-radius:2px; background:var(--border);"></div>
              </div>
              <div id="psLabel" style="font-family:var(--font-mono); font-size:10px; color:var(--text-dim); letter-spacing:1px;"></div>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="form-group">
            <label class="form-label">
              <span class="label-dot"></span> Confirm Password
            </label>
            <div class="input-wrap">
              <input type="password" id="suConfirm" class="form-input"
                     placeholder="Repeat password" autocomplete="new-password"/>
              <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </div>
          </div>

          <button class="btn-primary" id="btnSignup" onclick="handleSignUp()">
            <span id="btnSignupText"><span>Create Account</span></span>
          </button>
        </div>

      </div><!-- /card-body -->

      <footer class="card-footer">
        CIRCUITLAB v2.4 &nbsp;|&nbsp; SECURE CONNECTION &nbsp;|&nbsp; ALL DATA ENCRYPTED
      </footer>
    </div>
  </main>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-dot"></div>
    <span>FIREBASE AUTH</span>
    <span class="status-sep">|</span>
    <span id="authStatus">AWAITING CREDENTIALS</span>
    <span class="status-sep">|</span>
    <span id="clockDisplay"></span>
  </div>

  <!-- ═══════════════════════════════════════════════
       FIREBASE + APP SCRIPT
  ═══════════════════════════════════════════════ -->
  <script type="module">
    /* ── 1. PASTE YOUR FIREBASE CONFIG HERE ── */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      updateProfile,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAJhitr8d4fXRVBoRE_V3696fJf8IBEH0Y",
      authDomain:        "circuitlab-f165c.firebaseapp.com",
      projectId:         "circuitlab-f165c",
      storageBucket:     "circuitlab-f165c.firebasestorage.app",
      messagingSenderId: "622587600778",
      appId:             "1:622587600778:web:719479a80faa231619f273"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    /* ── 2. Auto-redirect if already signed in ── */
    onAuthStateChanged(auth, user => {
      if (user) redirect();
    });

    /* ── Redirect helper ── */
    function redirect() {
      setStatus("ACCESS GRANTED — LOADING WORKSPACE…");
      setTimeout(() => { window.location.href = "workspace.html"; }, 800);
    }

    /* ── 3. Sign In ── */
    window.handleSignIn = async () => {
      const email    = document.getElementById("siEmail").value.trim();
      const password = document.getElementById("siPassword").value;
      const msg      = document.getElementById("msgSignin");
      const btn      = document.getElementById("btnSignin");
      const btnText  = document.getElementById("btnSigninText");

      hideMsg(msg);
      if (!email || !password) { showMsg(msg, "error", "All fields required."); return; }

      setLoading(btn, btnText, true, "Authenticating");
      setStatus("VERIFYING CREDENTIALS…");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        showMsg(msg, "success", "Authentication successful — redirecting…");
        redirect();
      } catch (e) {
        showMsg(msg, "error", friendlyError(e.code));
        setStatus("AUTHENTICATION FAILED");
        setLoading(btn, btnText, false, "Initialize Session");
      }
    };

    /* ── 4. Sign Up ── */
    window.handleSignUp = async () => {
      const name     = document.getElementById("suName").value.trim();
      const email    = document.getElementById("suEmail").value.trim();
      const password = document.getElementById("suPassword").value;
      const confirm  = document.getElementById("suConfirm").value;
      const msg      = document.getElementById("msgSignup");
      const btn      = document.getElementById("btnSignup");
      const btnText  = document.getElementById("btnSignupText");

      hideMsg(msg);

      if (!name || !email || !password || !confirm) {
        showMsg(msg, "error", "All fields are required."); return;
      }
      if (password !== confirm) {
        showMsg(msg, "error", "Passwords do not match."); return;
      }
      if (password.length < 6) {
        showMsg(msg, "error", "Password must be at least 6 characters."); return;
      }

      setLoading(btn, btnText, true, "Creating Account");
      setStatus("REGISTERING USER…");

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        showMsg(msg, "success", "Account created — initializing workspace…");
        redirect();
      } catch (e) {
        showMsg(msg, "error", friendlyError(e.code));
        setStatus("REGISTRATION FAILED");
        setLoading(btn, btnText, false, "Create Account");
      }
    };

    /* ── 5. Google Sign In ── */
    window.handleGoogleSignIn = async () => {
      setStatus("OPENING GOOGLE AUTH…");
      try {
        await signInWithPopup(auth, provider);
        redirect();
      } catch (e) {
        setStatus("GOOGLE AUTH CANCELLED");
        const msg = document.getElementById("msgSignin");
        showMsg(msg, "error", friendlyError(e.code));
      }
    };

    /* ── Helpers ── */
    function showMsg(el, type, text) {
      el.className = `msg ${type}`;
      el.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${text}</span>`;
    }
    function hideMsg(el) {
      el.className = "msg hidden";
      el.innerHTML = "";
    }
    function setLoading(btn, btnText, loading, label) {
      btn.disabled = loading;
      btnText.innerHTML = loading
        ? `<span class="spinner"></span><span>${label}…</span>`
        : `<span>${label}</span>`;
    }
    function setStatus(text) {
      document.getElementById("authStatus").textContent = text;
    }
    function friendlyError(code) {
      const map = {
        "auth/invalid-email":          "Invalid email address format.",
        "auth/user-not-found":         "No account found with this email.",
        "auth/wrong-password":         "Incorrect password.",
        "auth/email-already-in-use":   "This email is already registered.",
        "auth/weak-password":          "Password is too weak.",
        "auth/too-many-requests":      "Too many attempts. Please wait and retry.",
        "auth/network-request-failed": "Network error. Check your connection.",
        "auth/popup-closed-by-user":   "Sign-in popup was closed.",
        "auth/invalid-credential":     "Invalid credentials. Check and retry.",
      };
      return map[code] || `Error: ${code}`;
    }

    /* ── Clock ── */
    function updateClock() {
      const now = new Date();
      document.getElementById("clockDisplay").textContent =
        now.toISOString().replace("T", " ").slice(0, 19) + " UTC";
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>

  <!-- Non-module helpers (tab switch, pw toggle, strength meter) -->
  <script>
    /* ── Tab Switch ── */
    function switchTab(tab) {
      const isSignin = tab === "signin";
      document.getElementById("tabSignIn").classList.toggle("active",  isSignin);
      document.getElementById("tabSignUp").classList.toggle("active", !isSignin);
      const pSi = document.getElementById("panelSignin");
      const pSu = document.getElementById("panelSignup");
      pSi.classList.toggle("active",  isSignin);
      pSu.classList.toggle("active", !isSignin);
      /* Re-trigger animation */
      const active = isSignin ? pSi : pSu;
      active.style.animation = "none";
      active.offsetHeight; // reflow
      active.style.animation = "";
    }

    /* ── Password visibility toggle ── */
    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const show  = input.type === "password";
      input.type  = show ? "text" : "password";
      btn.innerHTML = show
        ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
             <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
             <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
             <line x1="1" y1="1" x2="23" y2="23"/>
           </svg>`
        : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
             <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
             <circle cx="12" cy="12" r="3"/>
           </svg>`;
    }

    /* ── Password Strength Meter ── */
    document.getElementById("suPassword").addEventListener("input", function() {
      const val = this.value;
      const wrap = document.getElementById("pwStrength");
      if (!val) { wrap.style.display = "none"; return; }
      wrap.style.display = "block";

      let score = 0;
      if (val.length >= 8)         score++;
      if (/[A-Z]/.test(val))       score++;
      if (/[0-9]/.test(val))       score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const colors  = ["#ff3366", "#ff9900", "#00cfff", "#00ff9d"];
      const labels  = ["WEAK", "FAIR", "GOOD", "STRONG"];
      const segments = [
        document.getElementById("ps1"),
        document.getElementById("ps2"),
        document.getElementById("ps3"),
        document.getElementById("ps4"),
      ];
      segments.forEach((s, i) => {
        s.style.background   = i < score ? colors[score - 1] : "var(--border)";
        s.style.boxShadow    = i < score ? `0 0 6px ${colors[score-1]}` : "none";
      });
      document.getElementById("psLabel").textContent = "STRENGTH: " + labels[score - 1] || "WEAK";
      document.getElementById("psLabel").style.color = colors[score - 1] || colors[0];
    });

    /* ── Enter key support ── */
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        const panel = document.querySelector(".form-panel.active").id;
        if (panel === "panelSignin") window.handleSignIn?.();
        else window.handleSignUp?.();
      }
    });
  </script>
</body>
</html>
